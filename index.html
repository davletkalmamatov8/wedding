<title>Давлет и Индира · 21 августа 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@300;400&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
  background:#fdf6f0;
  font-family:'Jost',sans-serif;
  font-weight:300;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:24px 16px 60px;
  overflow-x:hidden;
}

.card{
  width:100%;
  max-width:440px;
  background:#fffaf7;
  border:1px solid #ead5c8;
  overflow:hidden;
}

/* flowers top */
.fl-top{display:block;width:100%;background:#fdf0ea;}

/* body */
.body{padding:28px 28px 0;text-align:center;}

.eyebrow{
  display:block;
  font-size:9px;letter-spacing:5px;text-transform:uppercase;
  color:#c9a090;margin-bottom:22px;
}

.wrap-names{position:relative;padding:0 44px;}

.names{
  font-family:'Great Vibes',cursive;
  font-size:68px;color:#8b5e52;line-height:1.05;display:block;
}
.amp{
  font-family:'Great Vibes',cursive;
  font-size:40px;color:#d4a090;display:block;margin:2px 0;
}

/* side florals */
.fl-side{
  position:absolute;top:50%;
  transform:translateY(-50%);
  pointer-events:none;
}
.fl-side-l{left:0;}
.fl-side-r{right:0;}

.divider{
  display:flex;align-items:center;gap:10px;
  margin:20px auto;width:fit-content;
}
.dl{width:40px;height:1px;background:#d9b5a5;}
.dd{width:4px;height:4px;border-radius:50%;background:#d9b5a5;}

.tagline{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;font-style:italic;font-weight:300;
  color:#a07060;line-height:1.9;margin-bottom:24px;
}

/* details */
.details{
  display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;
  background:#fdf0ea;
  border-top:1px solid #e8c9bc40;
  border-bottom:1px solid #e8c9bc40;
  margin:0 -28px 24px;
}
.d-sep{background:#e0bfb0;}
.d-cell{padding:14px 6px;text-align:center;}
.d-lbl{
  display:block;font-size:8px;letter-spacing:3px;
  text-transform:uppercase;color:#c9a090;margin-bottom:6px;
}
.d-val{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;color:#7a4a3a;line-height:1.4;
}

/* countdown */
.cd{
  display:flex;align-items:flex-start;justify-content:center;
  gap:10px;margin-bottom:28px;
}
.cd-item{text-align:center;min-width:48px;}
.cd-num{
  display:block;
  font-family:'Cormorant Garamond',serif;
  font-size:36px;color:#8b5e52;line-height:1;
  min-height:40px;
}
.cd-lbl{
  display:block;font-size:7px;letter-spacing:2px;
  text-transform:uppercase;color:#c9a09080;margin-top:4px;
}
.cd-sep{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;color:#ddbfb0;padding-top:4px;
}

/* rsvp */
.rsvp{padding:0 28px 28px;}

.field{margin-bottom:14px;}
.lbl{
  display:block;font-size:8px;letter-spacing:3px;
  text-transform:uppercase;color:#c9a090;margin-bottom:6px;
}
.inp{
  display:block;width:100%;
  background:#fdf8f5;
  border:1px solid #e0bfb0;
  padding:12px 14px;
  font-family:'Jost',sans-serif;
  font-size:16px;font-weight:300;
  color:#7a4a3a;
  outline:none;
  border-radius:0;
  -webkit-appearance:none;
  -webkit-border-radius:0;
}
.inp:focus{border-color:#c9a090;}

.two{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.radios{display:flex;gap:20px;flex-wrap:wrap;}
.rl{
  display:flex;align-items:center;gap:8px;
  font-size:14px;color:#a07060;cursor:pointer;
}
.rl input[type=radio]{
  width:18px;height:18px;
  accent-color:#b07060;
  cursor:pointer;
}

.btn{
  display:block;width:100%;margin-top:4px;
  font-family:'Jost',sans-serif;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:#fffaf7;background:#b07060;
  padding:15px;border:none;cursor:pointer;
  border-radius:0;-webkit-appearance:none;
  -webkit-border-radius:0;
}

.ok{
  display:none;text-align:center;
  padding:20px 0;
  font-family:'Cormorant Garamond',serif;
  font-size:19px;font-style:italic;
  color:#a07060;line-height:2;
}

/* bottom flowers */
.fl-bot{display:block;width:100%;background:#fdf0ea;}

@media(max-width:380px){
  .names{font-size:56px;}
  .two{grid-template-columns:1fr;}
}

<script>
// ── COUNTDOWN ──
var END = Date.UTC(2026,7,21,11,0,0); // 21 Aug 2026 17:00 Bishkek UTC+6

function go(){
  var now = Date.now(), diff = END - now;
  if(diff < 0) diff = 0;
  document.getElementById('D').textContent = Math.floor(diff/864e5);
  document.getElementById('H').textContent = ('0'+Math.floor(diff%864e5/36e5)).slice(-2);
  document.getElementById('M').textContent = ('0'+Math.floor(diff%36e5/6e4)).slice(-2);
  document.getElementById('S').textContent = ('0'+Math.floor(diff%6e4/1e3)).slice(-2);
  setTimeout(go, 1000);
}
go();

// ── RSVP ──
document.getElementById('sbtn').addEventListener('click', function(){
  var fn = document.getElementById('fn').value.trim();
  var att = document.querySelector('input[name="att"]:checked');
  if(!fn || !att){ alert('Укажите название семьи и выберите ответ'); return; }
  var txt = att.value==='yes'?'Придут':'Не придут';
  new Image().src = 'https://script.google.com/macros/s/AKfycbzQjvTsAKBcziOKuYO2rq8hfQrvXcc6Csg6tdyFcP5DrwL6PDPt71b09zit1KaK0erYLA/exec'
    +'?fname='+encodeURIComponent(fn)+'&lname=&attend='+encodeURIComponent(txt);
  document.getElementById('form').style.display='none';
  var ok = document.getElementById('ok');
  ok.style.display='block';
  ok.innerHTML = att.value==='yes'
    ? '🌸 Спасибо!<br>Ждём вас 21 августа 2026.'
    : '💐 Спасибо за ответ.<br>Будем скучать.';
});
</script>
